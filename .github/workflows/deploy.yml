name: Deploy

on:
  push:
    branches: [ master ] 

permissions:
  contents: read
  packages: write
  id-token: write

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire CLI
        run: |
          echo "Installing Aspire CLI from install script..."
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build and Push images with Aspire
        env:
          Parameters__registry_endpoint: ghcr.io
          Parameters__registry_repository: 2xpro-pop/interstyle

          Parameters__admin-login: ${{ secrets.ADMIN_LOGIN }}
          Parameters__admin-password: ${{ secrets.ADMIN_PASSWORD }}

          Parameters__jwt-signing-pfx: ${{ secrets.JWT_SIGNING_PFX }}
          Parameters__jwt-signing-password: ${{ secrets.JWT_SIGNING_PASSWORD }}
          Parameters__jwt-active-kid: main

        run: aspire do push --log-level debug