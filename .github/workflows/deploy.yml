name: Deploy

on:
  push:
    branches: [ master ] 

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire CLI
        run: |
          echo "Installing Aspire CLI from install script..."
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build and Push images with Aspire
        env:
          Parameters__registry_endpoint: ghcr.io
          Parameters__registry_repository: 2Xpro-pop/InterStyle
        run: aspire do push