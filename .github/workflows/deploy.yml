name: Deploy

on:
  push:
    branches: [ master ]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  DOTNET_ENVIRONMENT: Production
  ASPIRE_ENVIRONMENT: Production

jobs:
  deploy:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore') && !startsWith(github.event.head_commit.message, 'docs') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Downcase repo
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Deploy with Aspire
        working-directory: src/InterStyle.AppHost
        env:
          RepositoryUrl: https://github.com/${{ env.REPO }}

          Parameters__registry-endpoint: ghcr.io
          Parameters__registry-repository: ${{ env.REPO }}

          Parameters__admin-login: ${{ secrets.ADMIN_LOGIN }}
          Parameters__admin-password: ${{ secrets.ADMIN_PASSWORD }}
          Parameters__cache-password: ${{ secrets.CACHE_PASSWORD }}

          Parameters__mediatr-license-key: ${{ secrets.MEDIATR_LICENSE_KEY }}

          Parameters__jwt-signing-pfx: ${{ secrets.JWT_SIGNING_PFX }}
          Parameters__jwt-signing-password: ${{ secrets.JWT_SIGNING_PASSWORD }}
          Parameters__jwt-active-kid: main

          Parameters__captcha-google-token: ${{ secrets.CAPTCHA_GOOGLE_TOKEN }}
          Parameters__captcha-google-site-key: ${{ secrets.CAPTCHA_GOOGLE_SITE_KEY }}
        run: |
          rm -rf aspire-output
          aspire deploy --log-level debug

          test -f aspire-output/docker-compose.yaml
          test -f aspire-output/.env.Production

      - name: Pack deploy artifacts
        run: |
          rm -rf deploy-files deploy-files.tar.gz
          mkdir -p deploy-files
          cp src/InterStyle.AppHost/aspire-output/docker-compose.yaml deploy-files/
          cp src/InterStyle.AppHost/aspire-output/.env.Production deploy-files/
          tar -czf deploy-files.tar.gz deploy-files

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy-files.tar.gz"
          target: "/tmp/interstyle-deploy"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            STAGE_DIR=/tmp/interstyle-deploy
            INSTALL_DIR=/opt/interstyle/current

            mkdir -p "$INSTALL_DIR"

            cd "$STAGE_DIR"
            rm -rf deploy-files
            tar -xzf deploy-files.tar.gz

            rm -f "$INSTALL_DIR/docker-compose.yaml" "$INSTALL_DIR/.env.Production"
            cp deploy-files/docker-compose.yaml "$INSTALL_DIR/"
            cp deploy-files/.env.Production "$INSTALL_DIR/"

            cd "$INSTALL_DIR"

            docker compose --env-file .env.Production -f docker-compose.yaml pull
            docker compose --env-file .env.Production -f docker-compose.yaml up -d --remove-orphans

            docker image prune -af