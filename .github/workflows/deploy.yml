name: Deploy

on:
  push:
    branches: [ master ]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  DOTNET_ENVIRONMENT: Production
  ASPIRE_ENVIRONMENT: Production

jobs:
  deploy:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore') && !startsWith(github.event.head_commit.message, 'docs') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Downcase repo
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build and Push images with Aspire
        env:
          RepositoryUrl: https://github.com/${{ env.REPO }}

          Parameters__registry-endpoint: ghcr.io
          Parameters__registry-repository: ${{ env.REPO }}

          Parameters__admin-login: ${{ secrets.ADMIN_LOGIN }}
          Parameters__admin-password: ${{ secrets.ADMIN_PASSWORD }}

          Parameters__mediatr-license-key: ${{ secrets.MEDIATR_LICENSE_KEY }}

          Parameters__jwt-signing-pfx: ${{ secrets.JWT_SIGNING_PFX }}
          Parameters__jwt-signing-password: ${{ secrets.JWT_SIGNING_PASSWORD }}
          Parameters__jwt-active-kid: main

          Parameters__captcha-google-token: ${{ secrets.CAPTCHA_GOOGLE_TOKEN }}
          Parameters__captcha-google-site-key: ${{ secrets.CAPTCHA_GOOGLE_SITE_KEY }}
        run: aspire do push --log-level debug

      - name: Publish deployment artifacts
        env:
          RepositoryUrl: https://github.com/${{ env.REPO }}

          Parameters__registry-endpoint: ghcr.io
          Parameters__registry-repository: ${{ env.REPO }}

          Parameters__admin-login: ${{ secrets.ADMIN_LOGIN }}
          Parameters__admin-password: ${{ secrets.ADMIN_PASSWORD }}

          Parameters__mediatr-license-key: ${{ secrets.MEDIATR_LICENSE_KEY }}

          Parameters__jwt-signing-pfx: ${{ secrets.JWT_SIGNING_PFX }}
          Parameters__jwt-signing-password: ${{ secrets.JWT_SIGNING_PASSWORD }}
          Parameters__jwt-active-kid: main

          Parameters__captcha-google-token: ${{ secrets.CAPTCHA_GOOGLE_TOKEN }}
          Parameters__captcha-google-site-key: ${{ secrets.CAPTCHA_GOOGLE_SITE_KEY }}
        run: aspire publish --log-level debug

      - name: Resolve publish output directory
        run: |
          ASPIRE_OUTPUT_DIR=$(find . -type d -path "*/aspire-output" | head -n 1)

          if [ -z "$ASPIRE_OUTPUT_DIR" ]; then
            echo "Aspire publish output directory not found"
            find . -maxdepth 5 -type d | sort
            exit 1
          fi

          echo "Using Aspire output directory: $ASPIRE_OUTPUT_DIR"
          echo "ASPIRE_OUTPUT_DIR=$ASPIRE_OUTPUT_DIR" >> $GITHUB_ENV

      - name: Show publish output
        run: |
          find "$ASPIRE_OUTPUT_DIR" -maxdepth 5 -type f | sort

      - name: Pack publish artifacts
        run: |
          rm -rf deploy-files deploy-files.tar.gz
          mkdir -p deploy-files/aspire-output
          cp -R "$ASPIRE_OUTPUT_DIR"/. deploy-files/aspire-output/
          tar -czf deploy-files.tar.gz deploy-files

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy-files.tar.gz"
          target: "/tmp/interstyle-deploy"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            STAGE_DIR=/tmp/interstyle-deploy
            INSTALL_DIR=/opt/interstyle

            test -d "$INSTALL_DIR/current"

            cd "$STAGE_DIR"

            rm -rf deploy-files
            tar -xzf deploy-files.tar.gz

            rm -rf "$INSTALL_DIR/current"/*
            cp -R deploy-files/aspire-output/. "$INSTALL_DIR/current/"

            cd "$INSTALL_DIR/current"

            COMPOSE_FILE=$(find . -type f \( -name "docker-compose.yml" -o -name "docker-compose.yaml" -o -name "compose.yml" -o -name "compose.yaml" \) | head -n 1)

            if [ -z "$COMPOSE_FILE" ]; then
              echo "Compose file not found"
              find . -maxdepth 5 -type f
              exit 1
            fi

            ENV_FILE=$(find . -type f \( -name ".env.Production" -o -name ".env.production" \) | head -n 1)

            if [ -z "$ENV_FILE" ]; then
              echo "Production env file not found"
              find . -maxdepth 5 -type f | sort
              exit 1
            fi

            echo "Using compose file: $COMPOSE_FILE"
            echo "Using env file: $ENV_FILE"

            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" pull
            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d

            docker image prune -af