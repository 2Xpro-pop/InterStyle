server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/javascript application/json application/octet-stream application/wasm image/svg+xml text/css text/plain;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
